name: Terraform PR Validation

on:
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  
jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: examples/dev

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      
        

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan -no-color -input=false -lock-timeout=60s -out=tfplan
          terraform show -no-color tfplan > tfplan.txt
        id: plan
      
      - name: Save terraform plan to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 'terraform plan'
          path: examples/dev/tfplan
          if-no-files-found: error

      - name: Save terraform plan to artifacts as text
        uses: actions/upload-artifact@v4
        with:
          name: 'terraform plan txt'
          path: examples/dev/tfplan.txt
          if-no-files-found: error